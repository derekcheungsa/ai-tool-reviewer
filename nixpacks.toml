# Nixpacks config for monorepo: Next.js + FastAPI
providers = ["node", "python"]

# install runs AFTER providers (pip/npm available)
[phases.install]
  cmds = [
    "pip install -r backend/requirements.txt",
    "npm ci",
    "chmod +x start.sh"
  ]

# build runs after install
[phases.build]
  cmds = ["npm run build"]

[start]
  cmd = "./start.sh"
