# Nixpacks config for monorepo: Next.js + FastAPI
providers = ["node"]

# setup: install system Python + pip (Nix Python lacks pip)
[phases.setup]
  aptPkgs = ["python3", "python3-pip"]
  cmds = ["cp backend/requirements.txt ./requirements.txt"]

# install: pip + npm
[phases.install]
  cmds = [
    "pip3 install -r requirements.txt",
    "npm ci"
  ]

# build: Next.js production build
[phases.build]
  cmds = ["npm run build"]

[start]
  cmd = "./start.sh"
