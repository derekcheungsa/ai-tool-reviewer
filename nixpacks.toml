# Nixpacks config for monorepo: Next.js + FastAPI
providers = ["node", "python"]

# setup: copy requirements.txt to root so Python provider auto-detects it
[phases.setup]
  cmds = ["cp backend/requirements.txt ./requirements.txt"]

# install: npm ci + make start.sh executable
[phases.install]
  cmds = [
    "npm ci",
    "chmod +x start.sh"
  ]

# build: Next.js production build
[phases.build]
  cmds = ["npm run build"]

[start]
  cmd = "./start.sh"
