# Nixpacks config for monorepo: Next.js + FastAPI
providers = ["node"]

# setup: install system Python + pip, copy requirements.txt
[phases.setup]
  aptPkgs = ["python3", "python3-pip", "python3-venv"]
  cmds = ["cp backend/requirements.txt ./requirements.txt"]

# install: create venv, pip install, npm ci
[phases.install]
  cmds = [
    "python3 -m venv /opt/venv",
    "/opt/venv/bin/pip install -r requirements.txt",
    "npm ci"
  ]

# build: Next.js production build
[phases.build]
  cmds = ["npm run build"]

[start]
  cmd = "./start.sh"
